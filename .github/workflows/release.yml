name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z)'
        required: true

permissions:
  contents: write

jobs:
  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must be X.Y.Z"
            exit 1
          fi

      - name: Create and push tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

  build:
    needs: [create-tag]
    if: always() && (github.event_name == 'push' || needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            smoke: true
          - os: ubuntu-latest
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
            smoke: true
          - os: windows-latest
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            smoke: true
          - os: macos-latest
            runner: macos-14
            goos: darwin
            goarch: amd64
            ext: ""
            smoke: false
          - os: macos-14
            runner: macos-14
            goos: darwin
            goarch: arm64
            ext: ""
            smoke: true
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          BIN="topo-shadow-box-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "dist/$BIN" ./cmd/topo-shadow-box

      - name: Smoke test (unix)
        if: matrix.smoke && runner.os != 'Windows'
        shell: bash
        run: |
          BIN="topo-shadow-box-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          chmod +x "dist/$BIN"

          set +e
          OUTPUT=$("dist/$BIN" 2>&1)
          EXIT_CODE=$?
          set -e

          if [ "$EXIT_CODE" -ne 1 ]; then
            echo "Smoke test failed: expected exit code 1, got $EXIT_CODE"
            echo "$OUTPUT"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -q -- "--output is required"; then
            echo "Smoke test failed: missing expected validation output"
            echo "$OUTPUT"
            exit 1
          fi

      - name: Smoke test (windows)
        if: matrix.smoke && runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "dist\\topo-shadow-box-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          $output = cmd /c $bin 2>&1
          $exitCode = $LASTEXITCODE

          if ($exitCode -ne 1) {
            Write-Host "Smoke test failed: expected exit code 1, got $exitCode"
            Write-Host $output
            exit 1
          }
          if ($output -notmatch "--output is required") {
            Write-Host "Smoke test failed: missing expected validation output"
            Write-Host $output
            exit 1
          }

      - name: Package archive
        shell: bash
        run: |
          cd dist
          BASE="topo-shadow-box-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "$BASE.zip" "topo-shadow-box-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          else
            tar -czf "$BASE.tar.gz" "topo-shadow-box-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            go/dist/*.tar.gz
            go/dist/*.zip

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
